name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run publish dry-run only
        required: false
        type: boolean
        default: false
      package:
        description: Package name to publish. Leave empty to publish all internal packages.
        required: false
        type: string
        default: ''
      tag:
        description: npm dist-tag for publish commands.
        required: false
        type: string
        default: ''
      changed_since:
        description: Base ref for changed-package publishing.
        required: false
        type: string
        default: ''
      force_all:
        description: Publish all internal packages even when changed_since is set.
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'empjs-*-v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release package
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            package_name="${tag#empjs-}"
            package_name="${package_name%-v*}"
            echo "RELEASE_PACKAGE=@empjs/$package_name" >> "$GITHUB_ENV"
          else
            echo "RELEASE_PACKAGE=${{ github.event.inputs.package }}" >> "$GITHUB_ENV"
          fi
          release_tag="${{ github.event.inputs.tag || '' }}"
          if [[ -n "$release_tag" && ! "$release_tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid release tag: $release_tag" >&2
            exit 1
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          changed_since="${{ github.event.inputs.changed_since }}"
          if [[ -n "$changed_since" && ! "$changed_since" =~ ^[A-Za-z0-9._/@:-]+$ ]]; then
            echo "Invalid changed_since ref: $changed_since" >&2
            exit 1
          fi
          echo "CHANGED_SINCE=$changed_since" >> "$GITHUB_ENV"
          echo "FORCE_ALL=${{ github.event.inputs.force_all || false }}" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release automation
        run: |
          pnpm test:rules
          pnpm release:check

      - name: Build packages
        run: pnpm empbuild

      - name: Publish dry-run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          args=(--skip-build)
          if [[ -n "$RELEASE_PACKAGE" ]]; then
            args+=(--package "$RELEASE_PACKAGE")
          fi
          if [[ -n "$CHANGED_SINCE" ]]; then
            args+=(--changed-since "$CHANGED_SINCE")
          fi
          if [[ "$FORCE_ALL" == "true" ]]; then
            args+=(--force-all)
          fi
          if [[ -n "$RELEASE_TAG" ]]; then
            args+=(--tag "$RELEASE_TAG")
          fi
          pnpm release:publish:dry -- "${args[@]}"

      - name: Publish to npm
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        run: |
          args=(--yes --skip-build)
          if [[ -n "$RELEASE_PACKAGE" ]]; then
            args+=(--package "$RELEASE_PACKAGE")
          fi
          if [[ -n "$CHANGED_SINCE" ]]; then
            args+=(--changed-since "$CHANGED_SINCE")
          fi
          if [[ "$FORCE_ALL" == "true" ]]; then
            args+=(--force-all)
          fi
          if [[ -n "$RELEASE_TAG" ]]; then
            args+=(--tag "$RELEASE_TAG")
          fi
          pnpm release:publish -- "${args[@]}"
