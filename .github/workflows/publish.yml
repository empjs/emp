name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run publish dry-run only
        required: false
        type: boolean
        default: true
      confirm_publish:
        description: When dry-run is disabled, enter the exact package.json version to confirm publishing.
        required: false
        type: string
        default: ''
      package:
        description: Package name to publish. Leave empty to publish all internal packages.
        required: false
        type: string
        default: ''
      tag:
        description: npm dist-tag for publish commands.
        required: false
        type: string
        default: ''
      changed_since:
        description: Base ref for changed-package publishing.
        required: false
        type: string
        default: ''
      force_all:
        description: Publish all internal packages even when changed_since is set.
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'empjs-*-v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'npm-dry-run' || 'npm-production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release package
        env:
          INPUT_CHANGED_SINCE: ${{ inputs.changed_since || '' }}
          INPUT_CONFIRM_PUBLISH: ${{ inputs.confirm_publish || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || false }}
          INPUT_FORCE_ALL: ${{ inputs.force_all || false }}
          INPUT_PACKAGE: ${{ inputs.package || '' }}
          INPUT_TAG: ${{ inputs.tag || '' }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            package_name="${tag#empjs-}"
            package_name="${package_name%-v*}"
            release_package="@empjs/$package_name"
            tag_version="${tag##*-v}"
          else
            release_package="$INPUT_PACKAGE"
            tag_version=''
          fi
          if [[ -n "$release_package" && ! "$release_package" =~ ^@empjs/[a-z0-9-]+$ ]]; then
            echo "Invalid package name: $release_package" >&2
            exit 1
          fi
          echo "RELEASE_PACKAGE=$release_package" >> "$GITHUB_ENV"

          if [[ -n "$tag_version" ]]; then
            RELEASE_PACKAGE="$release_package" TAG_VERSION="$tag_version" node --input-type=module <<'NODE'
          import {readdirSync, readFileSync} from 'node:fs'
          import {join} from 'node:path'

          const manifests = readdirSync('packages', {withFileTypes: true})
            .filter(entry => entry.isDirectory())
            .map(entry => join('packages', entry.name, 'package.json'))
          const manifest = manifests
            .map(file => JSON.parse(readFileSync(file, 'utf8')))
            .find(pkg => pkg.name === process.env.RELEASE_PACKAGE)
          if (!manifest) throw new Error(`Unknown release package: ${process.env.RELEASE_PACKAGE}`)
          if (manifest.version !== process.env.TAG_VERSION) {
            throw new Error(`Tag version ${process.env.TAG_VERSION} does not match ${manifest.name}@${manifest.version}`)
          }
          NODE
          fi

          release_tag="$INPUT_TAG"
          if [[ -n "$release_tag" && ! "$release_tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid release tag: $release_tag" >&2
            exit 1
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          changed_since="$INPUT_CHANGED_SINCE"
          if [[ -n "$changed_since" && ! "$changed_since" =~ ^[A-Za-z0-9._/@:-]+$ ]]; then
            echo "Invalid changed_since ref: $changed_since" >&2
            exit 1
          fi
          echo "CHANGED_SINCE=$changed_since" >> "$GITHUB_ENV"
          echo "FORCE_ALL=$INPUT_FORCE_ALL" >> "$GITHUB_ENV"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "$INPUT_DRY_RUN" != "true" ]]; then
            expected_version="$(node -p "require('./package.json').version")"
            if [[ "$INPUT_CONFIRM_PUBLISH" != "$expected_version" ]]; then
              echo "Production publish requires confirm_publish=$expected_version" >&2
              exit 1
            fi
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          npm install -g corepack@latest
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release automation
        run: |
          pnpm test:rules
          pnpm release:check

      - name: Build packages
        run: pnpm empbuild

      - name: Publish dry-run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          args=(--skip-build)
          if [[ -n "$RELEASE_PACKAGE" ]]; then
            args+=(--package "$RELEASE_PACKAGE")
          fi
          if [[ -n "$CHANGED_SINCE" ]]; then
            args+=(--changed-since "$CHANGED_SINCE")
          fi
          if [[ "$FORCE_ALL" == "true" ]]; then
            args+=(--force-all)
          fi
          if [[ -n "$RELEASE_TAG" ]]; then
            args+=(--tag "$RELEASE_TAG")
          fi
          pnpm release:publish:dry -- "${args[@]}"

      - name: Publish to npm
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        run: |
          args=(--yes --skip-build)
          if [[ -n "$RELEASE_PACKAGE" ]]; then
            args+=(--package "$RELEASE_PACKAGE")
          fi
          if [[ -n "$CHANGED_SINCE" ]]; then
            args+=(--changed-since "$CHANGED_SINCE")
          fi
          if [[ "$FORCE_ALL" == "true" ]]; then
            args+=(--force-all)
          fi
          if [[ -n "$RELEASE_TAG" ]]; then
            args+=(--tag "$RELEASE_TAG")
          fi
          pnpm release:publish -- "${args[@]}"
