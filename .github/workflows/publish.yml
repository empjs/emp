name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run publish dry-run only
        required: false
        type: boolean
        default: false
      package:
        description: Package name to publish. Leave empty to publish all internal packages.
        required: false
        type: string
        default: '@empjs/cli'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release automation
        run: |
          node --test scripts/release.test.mjs
          pnpm release:check

      - name: Build packages
        run: pnpm empbuild

      - name: Publish dry-run
        if: ${{ inputs.dry_run }}
        run: pnpm release:publish:dry -- --skip-build --package "${{ inputs.package }}"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: pnpm release:publish -- --yes --skip-build --package "${{ inputs.package }}"
